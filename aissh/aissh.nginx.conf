# Nginx reverse proxy for AISSH
# Place this file at: /etc/nginx/sites-available/aissh
# Then: ln -s /etc/nginx/sites-available/aissh /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

upstream aissh_backend {
    server 127.0.0.1:5002;
}

server {
    listen 80;
    # listen 443 ssl;
    server_name _;  # Change to your domain

    # SSL (uncomment after certbot setup)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }

    client_max_body_size 50M;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # WebSocket support for terminal
    location /ws/ {
        proxy_pass http://aissh_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24h for long-running terminal sessions
        proxy_send_timeout 86400;
    }

    # SSE support for migrations and installs
    location ~ ^/(servers/.*/migrate|install_claude_code/) {
        proxy_pass http://aissh_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600;
    }

    # All other routes
    location / {
        proxy_pass http://aissh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
